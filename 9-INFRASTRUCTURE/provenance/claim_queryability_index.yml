  - id: "LITEBIRD-FALSIFIER"
    description: "LiteBIRD birefringence β falsifier"
    ledger_surfaces: ["FALSIFICATION_REGISTER", "OBSERVATION_TRACKER",
                      "INSTRUMENT_REGISTRY", "CLAIM_MASTER_BOARD", "TRUTH_LAYER"]
    machine_readable_surfaces: ["INSTRUMENT_REGISTRY"]
    note: "Primary decisive falsifier for entire framework"

# ──────────────────────────────────────────────────────────────────────────────
# Auditability rules
# ──────────────────────────────────────────────────────────────────────────────

rules:
  minimum_surfaces_per_claim: 3
  minimum_machine_readable_for_scored_claims: 1
  update_window_days: 30
  stale_doc_policy: "docs/9-INFRASTRUCTURE/provenance/DOC_FRESHNESS_POLICY.md"
