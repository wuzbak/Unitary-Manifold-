# Governance
# ──────────────────────────────────────────────────────────────────────────────

governance:
  prohibition: |
    NO promotion may be made by narrative argument alone.
    Required: (a) derivation artifact in src/, (b) passing test in tests/,
    (c) residual calculation and honest gap documentation in FALLIBILITY.md.
  blocked_promotion_triggers:
    - "Insufficient mathematical derivation in artifact"
    - "Test does not exist or fails"
    - "Residual undocumented"
    - "Derivation chain contains hidden free parameter"
    - "Score inflation pressure from adjacent tracks"
  log_policy: "Append-only; no retroactive edits; steward sign-off required for each entry"
