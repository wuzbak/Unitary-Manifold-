name: Bug report
about: Report a code or documentation defect.
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ⚖️ Epistemic boundary reminder: do not present adjacent-track outputs as hardgate physics claims.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Include commands, files, and expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, dependency versions.
