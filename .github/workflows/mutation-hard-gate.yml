name: Mutation Hard Gate

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  mutation-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MUTATION_KILL_RATE_MIN: "0.80"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt "mutmut<3"

      - name: Run mutation testing (focused inflation invariants)
        run: |
          mutmut run \
            --paths-to-mutate src/core/inflation.py \
            --runner "python -m pytest tests/test_inflation.py tests/test_braided_winding.py -x -q"

      - name: Check surviving mutants
        run: |
          python3 - <<'PY'
          import subprocess, sys, re

          result = subprocess.run(
              ["mutmut", "results"],
              capture_output=True, text=True
          )
          output = result.stdout + result.stderr
          print(output)

          survived = len(re.findall(r"(?i)survived|untested", output))
          killed_match = re.search(r"(\d+)\s+(?:killed|mutants killed)", output, re.I)
          killed = int(killed_match.group(1)) if killed_match else 0

          total = killed + survived
          if total == 0:
              print("No mutants generated; treating as PASS.")
              sys.exit(0)

          kill_rate = killed / total
          print(f"Kill rate: {kill_rate:.2%} ({killed}/{total})")

          import os
          minimum = float(os.environ.get("MUTATION_KILL_RATE_MIN", "0.80"))
          if kill_rate < minimum:
              print(f"FAIL: kill rate {kill_rate:.2%} < {minimum:.0%}")
              sys.exit(1)
          else:
              print(f"PASS: kill rate {kill_rate:.2%} >= {minimum:.0%}")
          PY
