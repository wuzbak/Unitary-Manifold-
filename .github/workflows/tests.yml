name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Fast test suite (tests/ — excludes @pytest.mark.slow)
  # ──────────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run pytest (fast suite — tests/)
        run: python -m pytest tests/ -v

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Slow test suite (tests/ -m slow — Richardson extrapolation etc.)
  # ──────────────────────────────────────────────────────────────────────────
  test-slow:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run pytest (slow suite — tests/ -m slow)
        run: python -m pytest tests/ -m slow -v

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Claims verification (claims/ — integer derivation, birefringence, etc.)
  # ──────────────────────────────────────────────────────────────────────────
  test-claims:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run pytest (claims/)
        run: python -m pytest claims/ -v

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4: Recycling suite (recycling/ — Pillar 16 φ-debt entropy accounting)
  # ──────────────────────────────────────────────────────────────────────────
  test-recycling:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run pytest (recycling/)
        run: python -m pytest recycling/ -v

  # ──────────────────────────────────────────────────────────────────────────
  # Job 5: Unitary Pentad suite (Unitary Pentad/ — HILS governance framework)
  # ──────────────────────────────────────────────────────────────────────────
  test-pentad:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run pytest (Unitary Pentad/)
        run: python -m pytest "5-GOVERNANCE/Unitary Pentad/" -v

  # ──────────────────────────────────────────────────────────────────────────
  # Job 6: ALGEBRA_PROOF.py — 114-check formal falsification proof
  # ──────────────────────────────────────────────────────────────────────────
  algebra-proof:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest sympy
      - name: Run ALGEBRA_PROOF.py (114 formal checks)
        run: python3 ALGEBRA_PROOF.py

  # ──────────────────────────────────────────────────────────────────────────
  # Job 7: Canonical ledger + onboarding docs consistency gate
  # Ensures no doc drifts away from the canonical test count in STATUS.md.
  # ──────────────────────────────────────────────────────────────────────────
  ledger-consistency:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install numpy scipy pytest
      - name: Run canonical ledger + onboarding consistency checks
        run: python -m pytest tests/test_canonical_ledger_consistency.py -v
